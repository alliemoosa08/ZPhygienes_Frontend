<mat-toolbar color="primary">
    <mat-toolbar-row>
        <span class="logo">
            <img src="assets/images/exotica_logo.png" class="navbarImg" (click)="home()">
        </span>

        <span class="class-spacer"></span>
        <span class="menu-spacer"></span>
        <div class="center-list">
            <button mat-button (click)="home()">
                <span>Home</span>
            </button>
            <button mat-button (click)="ourServices()">
                <span>Our Services</span>
            </button>
            <button mat-button (click)="aboutUs()">
                <span>About us</span>
            </button>
            <button mat-button (click)="contactUs()">
                <span>Contact us</span>
            </button>
        </div>

        <span class="class-spacer"></span>
        <div>
            <button mat-button>
                <span matBadge="0" matBadgeOverlap="false" matBadgeColor="warn">Book Now</span>
            </button>
        </div>
        <span style="flex: 0.05 0 auto;"></span>
    </mat-toolbar-row>
</mat-toolbar>
