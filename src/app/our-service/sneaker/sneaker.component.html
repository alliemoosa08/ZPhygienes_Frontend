<h1 class="header">Sneakers Cleaning Service</h1>
<br>

<div class="card-container">
    <mat-card class="items" *ngFor="let item of sneakers">
      <mat-card-header>
        <mat-card-title>{{item.Title}}</mat-card-title>
        <mat-card-subtitle><b>{{item.Price}}</b></mat-card-subtitle>
      </mat-card-header>
      <img class="item-icon" mat-card-image src="/assets/images/sneaker-services/{{item.Image}}" alt="{{item.Title}}">
      <mat-card-actions>
        <button mat-raised-button color="success">Add to Booking</button>
      </mat-card-actions>
    </mat-card>
  </div>
  <br>
